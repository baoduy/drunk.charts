apiVersion: v2
name: drunk-nginx-gateway
icon: https://drunkcoding.net/assets/logo.png
description: NGINX Gateway Fabric wrapper with Gateway API CRDs, GatewayClass, and cert-manager integration for drunk.charts
type: application
version: 1.0.0
appVersion: "v1.2.0"
keywords:
  - gateway-api
  - ingress
  - kubernetes
  - networking
  - nginx
home: https://github.com/baoduy/drunk.charts
sources:
  - https://github.com/baoduy/drunk.charts
  - https://github.com/kubernetes-sigs/gateway-api
  - https://github.com/nginx/nginx-gateway-fabric
maintainers:
  - name: baoduy
    email: drunkcoding@outlook.com

dependencies:
  - name: cert-manager
    version: v1.x.x
    repository: oci://quay.io/jetstack/charts
    alias: cert-manager
    condition: cert-manager.enabled
  - name: nginx-gateway-fabric
    version: 2.x.x
    repository: oci://ghcr.io/nginx/charts
    alias: nginxGatewayFabric
    condition: nginxGatewayFabric.enabled
